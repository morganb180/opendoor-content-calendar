name: Link Check

on:
  schedule:
    - cron: "17 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run link check
        id: link-check
        run: node scripts/link-check.js
        continue-on-error: true
      - name: File or update issue on failure
        if: steps.link-check.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          FAILURES: ${{ steps.link-check.outputs.failures }}
        with:
          script: |
            const title = "Link check failures";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "The scheduled link check found broken links in `data/calendar.json`:",
              "",
              "```",
              process.env.FAILURES || "(no details captured — see workflow run log)",
              "```",
              "",
              `Run: ${runUrl}`
            ].join("\n");

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = openIssues.find(i => !i.pull_request && i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
      - name: Fail workflow if link check failed
        if: steps.link-check.outcome == 'failure'
        run: exit 1
